# shuxueshuo.com — 静态站点（仓库 site/）
# 服务器代码目录：/home/ronghao/code/shuxueshuo
#
# 安装：sudo cp deploy/nginx/shuxueshuo.conf /etc/nginx/conf.d/shuxueshuo.conf
#       sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS：上线后用 certbot 或阿里云证书，在本文件中增加 listen 443 ssl 与证书路径。

server {
    listen 80;
    listen [::]:80;
    server_name shuxueshuo.com www.shuxueshuo.com;

    root /home/ronghao/code/shuxueshuo/site;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}
